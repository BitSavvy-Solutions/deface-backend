<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Ready</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .card {
            background: #16213e;
            border-radius: 16px;
            padding: 52px 48px;
            text-align: center;
            max-width: 640px;
            width: 100%;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        .icon { font-size: 4rem; margin-bottom: 20px; }

        h1 { font-size: 1.8rem; margin-bottom: 10px; }

        p { color: #888; margin-bottom: 32px; font-size: 0.95rem; }

        .media-preview {
            width: 100%;
            max-height: 400px;
            background: #000;
            border-radius: 10px;
            margin-bottom: 32px;
            object-fit: contain;
            border: 1px solid #2a3a5c;
        }

        .btn-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
        }

        .btn {
            display: inline-block;
            padding: 14px 24px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            text-decoration: none;
            transition: background 0.2s;
            cursor: pointer;
            border: none;
        }

        .btn-primary { background: #e94560; color: white; }
        .btn-primary:hover { background: #c73652; }

        .btn-secondary { background: #1a2f55; color: #ccc; }
        .btn-secondary:hover { background: #243d6e; }

        .btn-danger { background: transparent; border: 1px solid #e94560; color: #e94560; }
        .btn-danger:hover { background: #e94560; color: white; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">✅</div>
        <h1>Your media is ready!</h1>
        <p>All faces have been anonymized successfully.</p>
        
        {% if is_image %}
            <img src="/media/{{ filename }}" alt="Anonymized Image" class="media-preview">
        {% else %}
            <video src="/media/{{ filename }}" controls class="media-preview"></video>
        {% endif %}

        <div class="btn-group">
            <a class="btn btn-primary" href="/download/{{ filename }}">⬇️ Download</a>
            <a class="btn btn-secondary" href="/">Process Another File</a>
            <button class="btn btn-danger" onclick="deleteFiles('{{ file_id }}')">🗑️ Delete Files</button>
        </div>
    </div>

    <script>
        function deleteFiles(fileId) {
            if (!confirm('Are you sure you want to delete both the original and processed files from the server?')) {
                return;
            }
            
            fetch('/delete/' + fileId, { method: 'POST' })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        window.location.href = '/';
                    } else {
                        alert('Failed to delete files or files already removed.');
                    }
                })
                .catch(err => {
                    alert('An error occurred while deleting files.');
                });
        }
    </script>
</body>
</html>
