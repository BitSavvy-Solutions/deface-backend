<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Ready</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .card {
            background: #16213e;
            border-radius: 16px;
            padding: 52px 48px;
            text-align: center;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        .icon { font-size: 4rem; margin-bottom: 20px; }

        h1 { font-size: 1.8rem; margin-bottom: 10px; }

        p { color: #888; margin-bottom: 32px; font-size: 0.95rem; }

        .btn {
            display: inline-block;
            padding: 14px 32px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            text-decoration: none;
            margin: 6px;
            transition: background 0.2s;
        }

        .btn-primary { background: #e94560; color: white; }
        .btn-primary:hover { background: #c73652; }

        .btn-secondary { background: #1a2f55; color: #ccc; }
        .btn-secondary:hover { background: #243d6e; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">✅</div>
        <h1>Your video is ready!</h1>
        <p>All faces have been anonymized successfully.</p>
        <a class="btn btn-primary" href="/video/{{ filename }}" download>⬇️ Download Video</a>
        <a class="btn btn-secondary" href="/">Process Another Video</a>
    </div>
</body>
</html>
