<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face Anonymizer</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        header { text-align: center; margin-bottom: 32px; }
        header h1 { font-size: 2.4rem; color: #e94560; margin-bottom: 8px; }
        header p  { color: #888; font-size: 1rem; }

        .card {
            background: #16213e;
            border-radius: 16px;
            padding: 36px;
            width: 100%;
            max-width: 720px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
            background: #0f1f3d;
            padding: 6px;
            border-radius: 12px;
        }
        .tab {
            flex: 1;
            padding: 12px;
            background: transparent;
            border: none;
            color: #888;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .tab.active {
            background: #e94560;
            color: white;
        }

        .panel { display: none; }
        .panel.active { display: block; }

        .section-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #666;
            margin-bottom: 12px;
            margin-top: 28px;
        }
        .section-label:first-child { margin-top: 0; }

        .file-upload {
            border: 2px dashed #2a3a5c;
            border-radius: 10px;
            padding: 32px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s;
            position: relative;
        }
        .file-upload:hover { border-color: #e94560; }
        .file-upload input[type="file"] {
            position: absolute; inset: 0; opacity: 0;
            cursor: pointer; width: 100%; height: 100%;
        }
        .file-upload .icon  { font-size: 2.2rem; margin-bottom: 8px; }
        .file-upload .hint  { color: #666; font-size: 0.9rem; }
        .file-upload .file-name { color: #e94560; margin-top: 8px; font-weight: bold; font-size: 0.95rem; }

        .media-container {
            width: 100%;
            background: #0a0a14;
            border-radius: 10px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid #2a3a5c;
        }
        .media-container video, .media-container img {
            width: 100%;
            max-height: 400px;
            background: #000;
            object-fit: contain;
            display: none;
        }
        .media-controls {
            width: 100%;
            padding: 16px;
            display: flex;
            justify-content: center;
            gap: 12px;
            background: #0f1f3d;
        }
        .btn-action {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            color: white;
        }
        .btn-start { background: #e94560; }
        .btn-start:hover { background: #c73652; }
        .btn-stop { background: #555; }
        .btn-stop:hover { background: #444; }

        .style-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; }
        .style-option { position: relative; }
        .style-option input[type="radio"] { position: absolute; opacity: 0; width: 0; }
        .style-option label {
            display: flex; flex-direction: column; align-items: center;
            padding: 16px 10px; background: #0f1f3d;
            border: 2px solid #2a3a5c; border-radius: 10px;
            cursor: pointer; transition: all 0.2s; text-align: center; gap: 4px;
        }
        .style-option label .icon { font-size: 1.6rem; }
        .style-option label .name { font-size: 0.9rem; font-weight: bold; }
        .style-option label .desc { font-size: 0.7rem; color: #666; }
        .style-option input:checked + label { border-color: #e94560; background: #1f0d15; }
        .style-option label:hover { border-color: #e94560; }

        .mosaic-size-row {
            display: none; margin-top: 16px; align-items: center; gap: 16px;
            background: #0f1f3d; padding: 16px; border-radius: 10px;
        }
        .mosaic-size-row.visible { display: flex; }
        .mosaic-size-row label { font-size: 0.9rem; color: #aaa; white-space: nowrap; }
        .mosaic-size-row input[type="range"] { flex: 1; accent-color: #e94560; }

        .range-value { font-weight: bold; color: #e94560; min-width: 40px; text-align: right; }

        .form-row { display: flex; gap: 16px; flex-wrap: wrap; }
        .form-group { flex: 1; min-width: 200px; }
        .form-group label { display: block; font-size: 0.82rem; color: #aaa; margin-bottom: 6px; }
        .form-group input[type="range"] { width: 100%; accent-color: #e94560; }
        .form-group input[type="text"],
        .form-group select {
            width: 100%; padding: 10px 12px; background: #0f1f3d;
            border: 1px solid #2a3a5c; border-radius: 8px;
            color: #e0e0e0; font-size: 0.9rem;
        }

        .inline-range { display: flex; align-items: center; gap: 10px; }
        .inline-range input { flex: 1; }

        .checkbox-row { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 4px; }
        .checkbox-item { display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .checkbox-item input[type="checkbox"] {
            accent-color: #e94560; width: 15px; height: 15px; cursor: pointer;
        }
        .checkbox-item label { font-size: 0.88rem; cursor: pointer; }

        .advanced-toggle {
            background: none; border: 1px solid #2a3a5c; color: #aaa;
            cursor: pointer; font-size: 0.85rem; padding: 8px 16px;
            border-radius: 8px; display: flex; align-items: center;
            gap: 6px; margin-top: 24px; transition: all 0.2s;
        }
        .advanced-toggle:hover { border-color: #e94560; color: #e94560; }

        .advanced-section { display: none; margin-top: 16px; }
        .advanced-section.visible { display: block; }

        .submit-btn {
            width: 100%; padding: 16px; background: #e94560; color: white;
            border: none; border-radius: 10px; font-size: 1.1rem;
            font-weight: bold; cursor: pointer; margin-top: 28px; transition: background 0.2s;
        }
        .submit-btn:hover    { background: #c73652; }
        .submit-btn:disabled { background: #444; cursor: not-allowed; }

        .error-box {
            display: none; margin-top: 16px; padding: 14px 18px;
            background: #2a0f15; border: 1px solid #e94560;
            border-radius: 10px; color: #e94560;
            font-size: 0.88rem; line-height: 1.5;
            white-space: pre-wrap; text-align: left;
        }

        .loading-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.85); z-index: 100;
            align-items: center; justify-content: center;
        }
        .loading-overlay.visible { display: flex; }

        .progress-card {
            background: #16213e; border-radius: 16px;
            padding: 40px 48px; width: 90%; max-width: 460px;
            text-align: center; box-shadow: 0 8px 40px rgba(0,0,0,0.6);
        }
        .progress-card .p-icon  { font-size: 3rem; margin-bottom: 14px; }
        .progress-card .p-title { font-size: 1.3rem; margin-bottom: 28px; color: #e0e0e0; }

        .pbar-wrap {
            background: #0f1f3d; border-radius: 99px;
            height: 14px; overflow: hidden; margin-bottom: 14px;
        }
        .pbar-fill {
            height: 100%;
            background: linear-gradient(90deg, #c73652, #e94560);
            border-radius: 99px; width: 0%;
            transition: width 0.4s ease;
        }

        .p-stats-row {
            display: flex; justify-content: space-between;
            align-items: flex-end; margin-bottom: 16px;
        }
        .p-pct    { font-size: 1.6rem; font-weight: bold; color: #e94560; }
        .p-frames { font-size: 0.85rem; color: #555; }
        .p-time   { color: #888; font-size: 0.88rem; margin-bottom: 6px; min-height: 1.2em; }
        .p-speed  { color: #555; font-size: 0.8rem; min-height: 1em; }
    </style>
</head>
<body>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="progress-card">
            <div class="p-icon">🎭</div>
            <p class="p-title">Anonymizing Media</p>
            <div class="pbar-wrap">
                <div class="pbar-fill" id="pbarFill"></div>
            </div>
            <div class="p-stats-row">
                <span class="p-pct"    id="pPct">0%</span>
                <span class="p-frames" id="pFrames"></span>
            </div>
            <p class="p-time"  id="pTime">Starting up...</p>
            <p class="p-speed" id="pSpeed"></p>
        </div>
    </div>

    <header>
        <h1>🎭 Face Anonymizer</h1>
        <p>Upload or record media to automatically anonymize all detected faces</p>
    </header>

    <div class="card">
        <div class="tabs">
            <button type="button" class="tab active" onclick="setMode('upload')" id="tabUpload">Upload File</button>
            <button type="button" class="tab" onclick="setMode('record')" id="tabRecord">Record Video</button>
            <button type="button" class="tab" onclick="setMode('photo')" id="tabPhoto">Take Photo</button>
        </div>

        <form id="mainForm" enctype="multipart/form-data">

            <div id="panelUpload" class="panel active">
                <div class="file-upload">
                    <input type="file" id="fileInput" accept="video/*,image/*">
                    <div class="icon">🎬</div>
                    <p class="hint">Click to select a video or photo file</p>
                    <p class="file-name" id="fileName">No file selected</p>
                </div>
            </div>

            <div id="panelRecord" class="panel">
                <div class="media-container">
                    <video id="recordLive" autoplay muted playsinline></video>
                    <video id="recordPreview" controls></video>
                    <div class="media-controls">
                        <button type="button" class="btn-action btn-start" id="btnStartRecord" onclick="startRecording()">Start Recording</button>
                        <button type="button" class="btn-action btn-stop" id="btnStopRecord" onclick="stopRecording()" style="display:none;">Stop Recording</button>
                        <button type="button" class="btn-action btn-stop" id="btnRetakeVideo" onclick="resetRecord()" style="display:none;">Record again</button>
                    </div>
                </div>
            </div>

            <div id="panelPhoto" class="panel">
                <div class="media-container">
                    <video id="photoLive" autoplay muted playsinline></video>
                    <img id="photoPreview" alt="Captured photo">
                    <canvas id="photoCanvas" style="display:none;"></canvas>
                    <div class="media-controls">
                        <button type="button" class="btn-action btn-start" id="btnTakePhoto" onclick="takePhoto()">Capture Photo</button>
                        <button type="button" class="btn-action btn-stop" id="btnRetakePhoto" onclick="resetPhoto()" style="display:none;">Take another</button>
                    </div>
                </div>
            </div>

            <p class="section-label" style="margin-top:28px;">Anonymization Style</p>
            <div class="style-grid">
                <div class="style-option">
                    <input type="radio" name="replacewith" id="r_blur" value="blur" checked>
                    <label for="r_blur">
                        <span class="icon">🌫️</span>
                        <span class="name">Blur</span>
                        <span class="desc">Gaussian blur effect</span>
                    </label>
                </div>
                <div class="style-option">
                    <input type="radio" name="replacewith" id="r_mosaic" value="mosaic">
                    <label for="r_mosaic">
                        <span class="icon">🟦</span>
                        <span class="name">Mosaic</span>
                        <span class="desc">Pixelated tile effect</span>
                    </label>
                </div>
                <div class="style-option">
                    <input type="radio" name="replacewith" id="r_solid" value="solid">
                    <label for="r_solid">
                        <span class="icon">⬛</span>
                        <span class="name">Solid</span>
                        <span class="desc">Solid black box</span>
                    </label>
                </div>
                <div class="style-option">
                    <input type="radio" name="replacewith" id="r_none" value="none">
                    <label for="r_none">
                        <span class="icon">👁️</span>
                        <span class="name">None</span>
                        <span class="desc">Detect only</span>
                    </label>
                </div>
            </div>

            <div class="mosaic-size-row" id="mosaicRow">
                <label for="mosaicsize">Mosaic Tile Size</label>
                <input type="range" name="mosaicsize" id="mosaicsize" min="5" max="100" value="20"
                       oninput="document.getElementById('mosaicVal').textContent = this.value + 'px'">
                <span class="range-value" id="mosaicVal">20px</span>
            </div>

            <p class="section-label" style="margin-top:28px;">Detection Settings</p>
            <div class="form-row">
                <div class="form-group">
                    <label for="thresh">Detection Threshold</label>
                    <div class="inline-range">
                        <input type="range" name="thresh" id="thresh"
                               min="0.01" max="1.0" step="0.01" value="0.2"
                               oninput="document.getElementById('threshVal').textContent = parseFloat(this.value).toFixed(2)">
                        <span class="range-value" id="threshVal">0.20</span>
                    </div>
                </div>
                <div class="form-group">
                    <label for="mask_scale">Mask Scale</label>
                    <div class="inline-range">
                        <input type="range" name="mask_scale" id="mask_scale"
                               min="0.5" max="3.0" step="0.1" value="1.3"
                               oninput="document.getElementById('maskVal').textContent = parseFloat(this.value).toFixed(1)">
                        <span class="range-value" id="maskVal">1.3</span>
                    </div>
                </div>
            </div>

            <p class="section-label" style="margin-top:24px;">Options</p>
            <div class="checkbox-row">
                <div class="checkbox-item">
                    <input type="checkbox" name="keep_audio" id="keep_audio" value="on">
                    <label for="keep_audio">Keep original audio</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" name="boxes" id="boxes" value="on">
                    <label for="boxes">Use rectangular boxes</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" name="draw_scores" id="draw_scores" value="on">
                    <label for="draw_scores">Draw detection scores</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" name="keep_metadata" id="keep_metadata" value="on">
                    <label for="keep_metadata">Keep original metadata</label>
                </div>
            </div>

            <button type="button" class="advanced-toggle" onclick="toggleAdvanced()">
                ⚙️ Advanced Settings <span id="advIcon">▼</span>
            </button>

            <div class="advanced-section" id="advSection">
                <div class="form-row">
                    <div class="form-group">
                        <label for="scale">Inference Scale</label>
                        <input type="text" name="scale" id="scale" placeholder="Leave empty for default">
                    </div>
                    <div class="form-group">
                        <label for="backend">Processing Backend</label>
                        <select name="backend" id="backend">
                            <option value="auto">Auto</option>
                            <option value="onnxrt">ONNX Runtime</option>
                            <option value="opencv">OpenCV</option>
                        </select>
                    </div>
                </div>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">🎭 Anonymize Media</button>
            <div class="error-box" id="errorBox"></div>

        </form>
    </div>

    <script>
        let currentMode = 'upload';
        let stream = null;
        let mediaRecorder = null;
        let recordedChunks = [];
        let recordedBlob = null;
        let photoBlob = null;

        document.getElementById('fileInput').addEventListener('change', function () {
            document.getElementById('fileName').textContent =
                this.files[0] ? this.files[0].name : 'No file selected';
        });

        document.querySelectorAll('input[name="replacewith"]').forEach(function (radio) {
            radio.addEventListener('change', function () {
                document.getElementById('mosaicRow').classList.toggle('visible', this.value === 'mosaic');
            });
        });

        function toggleAdvanced() {
            var section = document.getElementById('advSection');
            var icon    = document.getElementById('advIcon');
            section.classList.toggle('visible');
            icon.textContent = section.classList.contains('visible') ? '▲' : '▼';
        }

        function stopStream() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }
        }

        async function setMode(mode) {
            currentMode = mode;
            stopStream();
            
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            
            document.getElementById('tab' + mode.charAt(0).toUpperCase() + mode.slice(1)).classList.add('active');
            document.getElementById('panel' + mode.charAt(0).toUpperCase() + mode.slice(1)).classList.add('active');

            if (mode === 'record') {
                resetRecord();
            } else if (mode === 'photo') {
                resetPhoto();
            }
        }

        async function startCamera(videoElementId, audio) {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: audio });
                const videoElement = document.getElementById(videoElementId);
                videoElement.srcObject = stream;
                videoElement.style.display = 'block';
            } catch (err) {
                showError('Camera access denied or unavailable.');
            }
        }

        function resetRecord() {
            recordedBlob = null;
            recordedChunks = [];
            document.getElementById('recordPreview').style.display = 'none';
            document.getElementById('btnStartRecord').style.display = 'inline-block';
            document.getElementById('btnStopRecord').style.display = 'none';
            document.getElementById('btnRetakeVideo').style.display = 'none';
            startCamera('recordLive', true);
        }

        function startRecording() {
            if (!stream) return;
            recordedChunks = [];
            mediaRecorder = new MediaRecorder(stream);
            mediaRecorder.ondataavailable = e => {
                if (e.data.size > 0) recordedChunks.push(e.data);
            };
            mediaRecorder.onstop = () => {
                recordedBlob = new Blob(recordedChunks, { type: 'video/webm' });
                const videoUrl = URL.createObjectURL(recordedBlob);
                const preview = document.getElementById('recordPreview');
                preview.src = videoUrl;
                preview.style.display = 'block';
                document.getElementById('recordLive').style.display = 'none';
                
                document.getElementById('btnStopRecord').style.display = 'none';
                document.getElementById('btnRetakeVideo').style.display = 'inline-block';
                stopStream();
            };
            mediaRecorder.start();
            document.getElementById('btnStartRecord').style.display = 'none';
            document.getElementById('btnStopRecord').style.display = 'inline-block';
        }

        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
            }
        }

        function resetPhoto() {
            photoBlob = null;
            document.getElementById('photoPreview').style.display = 'none';
            document.getElementById('btnTakePhoto').style.display = 'inline-block';
            document.getElementById('btnRetakePhoto').style.display = 'none';
            startCamera('photoLive', false);
        }

        function takePhoto() {
            const video = document.getElementById('photoLive');
            const canvas = document.getElementById('photoCanvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            canvas.toBlob(blob => {
                photoBlob = blob;
                const imgUrl = URL.createObjectURL(blob);
                const preview = document.getElementById('photoPreview');
                preview.src = imgUrl;
                preview.style.display = 'block';
                video.style.display = 'none';
                
                document.getElementById('btnTakePhoto').style.display = 'none';
                document.getElementById('btnRetakePhoto').style.display = 'inline-block';
                stopStream();
            }, 'image/jpeg', 0.95);
        }

        document.getElementById('mainForm').addEventListener('submit', function (e) {
            e.preventDefault();
            document.getElementById('errorBox').style.display = 'none';

            const formData = new FormData(this);
            
            if (currentMode === 'upload') {
                const fileInput = document.getElementById('fileInput');
                if (!fileInput.files[0]) return showError('Please select a file');
                formData.append('file', fileInput.files[0]);
            } else if (currentMode === 'record') {
                if (!recordedBlob) return showError('Please record a video first');
                formData.append('file', recordedBlob, 'video.webm');
            } else if (currentMode === 'photo') {
                if (!photoBlob) return showError('Please take a photo first');
                formData.append('file', photoBlob, 'photo.jpg');
            }

            document.getElementById('submitBtn').disabled = true;
            document.getElementById('submitBtn').textContent = 'Processing...';
            document.getElementById('loadingOverlay').classList.add('visible');
            document.getElementById('pTime').textContent = 'Uploading media...';

            fetch('/process', { method: 'POST', body: formData })
                .then(r => r.json())
                .then(data => {
                    if (data.error) { hideOverlay(); showError(data.error); return; }
                    openProgressStream(data.job_id);
                })
                .catch(() => {
                    hideOverlay();
                    showError('Upload failed. Please try again.');
                });
        });

        function openProgressStream(jobId) {
            document.getElementById('pTime').textContent = 'Processing...';
            var es = new EventSource('/progress/' + jobId);

            es.onmessage = function (evt) {
                var msg = JSON.parse(evt.data);

                if (msg.type === 'progress') {
                    document.getElementById('pbarFill').style.width = msg.percent + '%';
                    document.getElementById('pPct').textContent     = msg.percent + '%';
                    document.getElementById('pFrames').textContent  = msg.current + ' / ' + msg.total + ' frames';
                    document.getElementById('pTime').textContent    = msg.elapsed + ' elapsed, ' + msg.remaining + ' remaining';
                    document.getElementById('pSpeed').textContent   = msg.speed;
                } else if (msg.type === 'log') {
                    document.getElementById('pTime').textContent = msg.message;
                } else if (msg.type === 'done') {
                    es.close();
                    document.getElementById('pbarFill').style.width = '100%';
                    document.getElementById('pPct').textContent     = '100%';
                    document.getElementById('pTime').textContent    = 'Done! Redirecting...';
                    setTimeout(() => window.location.href = '/result/' + msg.filename, 800);
                } else if (msg.type === 'error') {
                    es.close();
                    hideOverlay();
                    showError(msg.message || 'Processing failed');
                }
            };

            es.onerror = function () {
                es.close();
                hideOverlay();
                showError('Connection lost during processing. Please try again.');
            };
        }

        function hideOverlay() {
            document.getElementById('loadingOverlay').classList.remove('visible');
            document.getElementById('submitBtn').disabled = false;
            document.getElementById('submitBtn').textContent = '🎭 Anonymize Media';
        }

        function showError(msg) {
            var box = document.getElementById('errorBox');
            box.textContent = msg;
            box.style.display = 'block';
            box.scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
