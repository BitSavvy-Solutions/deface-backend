name: Trigger auto deployment for face-anonymizer

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/face-anonymizer-AutoDeployTrigger-2d389c46-8805-4e09-87ad-d1311857854e.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.FACEANONYMIZER_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.FACEANONYMIZER_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.FACEANONYMIZER_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: iverseregistry.azurecr.io
          registryUsername: ${{ secrets.FACEANONYMIZER_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.FACEANONYMIZER_REGISTRY_PASSWORD }}
          containerAppName: face-anonymizer
          resourceGroup: iverse
          imageToBuild: iverseregistry.azurecr.io/face-anonymizer:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


